name: 🧪 Test maxregnerOS Ultra-Fast

on:
  push:
    branches: [ main, develop, 'codegen-bot/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  MAXREGNEROS_VERSION: "1.0.0"

jobs:
  code-quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Check Assembly Syntax
        run: |
          echo "🔍 Checking assembly code syntax..."
          
          # Check for common assembly syntax issues
          find . -name "*.asm" -o -name "*.inc" | while read file; do
            echo "Checking: $file"
            
            # Check for basic syntax issues
            if grep -n "^[[:space:]]*include.*'" "$file" | grep -v "^[[:space:]]*;" ; then
              echo "✅ Include statements found in $file"
            fi
            
            # Check for proper procedure definitions
            if grep -n "^[[:space:]]*proc\|^[[:space:]]*endp" "$file" | head -5; then
              echo "✅ Procedure definitions found in $file"
            fi
          done
          
          echo "✅ Assembly syntax check complete"

      - name: 🧠 Validate Ultra-Fast Architecture
        run: |
          echo "🧠 Validating Ultra-Fast Architecture components..."
          
          ARCH_DIR="kernel/trunk/maxregneros-arch"
          
          if [ -d "$ARCH_DIR" ]; then
            echo "✅ Ultra-Fast Architecture directory found"
            
            # Check for required components
            components=("ultra_arch.inc" "ultra_memory.inc" "ultra_io.inc" "ultra_filesystem.inc" "ultra_scheduler.inc")
            
            for component in "${components[@]}"; do
              if [ -f "$ARCH_DIR/$component" ]; then
                echo "✅ $component found"
                
                # Check for key functions/procedures
                case "$component" in
                  "ultra_memory.inc")
                    if grep -q "ultra_alloc_fast\|ultra_free_fast" "$ARCH_DIR/$component"; then
                      echo "  ✅ Memory management functions found"
                    fi
                    ;;
                  "ultra_io.inc")
                    if grep -q "ultra_io_submit_async\|ultra_io_submit_sync" "$ARCH_DIR/$component"; then
                      echo "  ✅ I/O management functions found"
                    fi
                    ;;
                  "ultra_filesystem.inc")
                    if grep -q "ultra_fs_read\|ultra_fs_write" "$ARCH_DIR/$component"; then
                      echo "  ✅ File system functions found"
                    fi
                    ;;
                  "ultra_scheduler.inc")
                    if grep -q "ultra_schedule\|ultra_context_switch" "$ARCH_DIR/$component"; then
                      echo "  ✅ Scheduler functions found"
                    fi
                    ;;
                esac
              else
                echo "❌ $component missing"
                exit 1
              fi
            done
          else
            echo "❌ Ultra-Fast Architecture directory not found"
            exit 1
          fi

      - name: 🎨 Validate MROS DDE Components
        run: |
          echo "🎨 Validating MROS Desktop Environment..."
          
          DDE_DIR="programs/mros-dde"
          
          if [ -d "$DDE_DIR" ]; then
            echo "✅ MROS DDE directory found"
            
            # Check for required DDE components
            if [ -f "$DDE_DIR/desktop.asm" ]; then
              echo "✅ Desktop manager found"
            else
              echo "❌ Desktop manager missing"
              exit 1
            fi
            
            if [ -f "$DDE_DIR/panel.asm" ]; then
              echo "✅ Panel/taskbar found"
            else
              echo "❌ Panel/taskbar missing"
              exit 1
            fi
            
            if [ -f "$DDE_DIR/README.md" ]; then
              echo "✅ DDE documentation found"
            fi
          else
            echo "❌ MROS DDE directory not found"
            exit 1
          fi

      - name: 🌈 Validate Vibrant Skin
        run: |
          echo "🌈 Validating maxregnerOS-vibrant skin..."
          
          SKIN_DIR="skins/maxregnerOS-vibrant"
          
          if [ -d "$SKIN_DIR" ]; then
            echo "✅ Vibrant skin directory found"
            
            # Check for skin components
            if [ -f "$SKIN_DIR/default.asm" ]; then
              echo "✅ Default skin found"
            else
              echo "❌ Default skin missing"
              exit 1
            fi
            
            if [ -f "$SKIN_DIR/dtp.asm" ]; then
              echo "✅ Desktop theme parameters found"
            else
              echo "❌ Desktop theme parameters missing"
              exit 1
            fi
            
            # Check for bitmap resources
            if ls "$SKIN_DIR"/*.bmp >/dev/null 2>&1; then
              echo "✅ Bitmap resources found"
            else
              echo "⚠️ No bitmap resources found"
            fi
          else
            echo "❌ Vibrant skin directory not found"
            exit 1
          fi

  build-test:
    name: 🔨 Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        performance-level: [conservative, balanced, aggressive]
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential nasm genisoimage curl wget

      - name: 🔨 Test Build Scripts
        run: |
          echo "🔨 Testing build scripts with performance level: ${{ matrix.performance-level }}"
          
          # Make scripts executable
          chmod +x scripts/*.sh
          
          # Test script syntax
          for script in scripts/*.sh; do
            echo "Testing syntax of $script"
            bash -n "$script" && echo "✅ $script syntax OK" || echo "❌ $script syntax error"
          done
          
          # Test build script (dry run)
          echo "Testing build script execution..."
          export PERFORMANCE_LEVEL="${{ matrix.performance-level }}"
          export DRY_RUN=true
          
          # Run build script in test mode
          if [ -f "scripts/build-maxregneros-iso.sh" ]; then
            echo "Testing ISO build script..."
            # We can't actually build without FASM, but we can test the script logic
            bash -x scripts/build-maxregneros-iso.sh 2>&1 | head -20 || echo "Build script test completed"
          fi

  performance-analysis:
    name: 📊 Performance Analysis
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📊 Analyze Performance Features
        run: |
          echo "📊 Analyzing Ultra-Fast Architecture performance features..."
          
          ARCH_DIR="kernel/trunk/maxregneros-arch"
          
          # Count performance optimizations
          echo "🧠 Memory Management Optimizations:"
          if [ -f "$ARCH_DIR/ultra_memory.inc" ]; then
            echo "  - Lock-free allocation: $(grep -c "lock.*free\|atomic" "$ARCH_DIR/ultra_memory.inc" || echo 0) references"
            echo "  - Memory pools: $(grep -c "pool" "$ARCH_DIR/ultra_memory.inc" || echo 0) references"
            echo "  - NUMA awareness: $(grep -c -i "numa" "$ARCH_DIR/ultra_memory.inc" || echo 0) references"
            echo "  - Prefetching: $(grep -c -i "prefetch" "$ARCH_DIR/ultra_memory.inc" || echo 0) references"
          fi
          
          echo "⚡ I/O Optimizations:"
          if [ -f "$ARCH_DIR/ultra_io.inc" ]; then
            echo "  - Async operations: $(grep -c -i "async\|asynchronous" "$ARCH_DIR/ultra_io.inc" || echo 0) references"
            echo "  - NVMe support: $(grep -c -i "nvme" "$ARCH_DIR/ultra_io.inc" || echo 0) references"
            echo "  - DMA operations: $(grep -c -i "dma" "$ARCH_DIR/ultra_io.inc" || echo 0) references"
            echo "  - Zero-copy: $(grep -c -i "zero.*copy" "$ARCH_DIR/ultra_io.inc" || echo 0) references"
          fi
          
          echo "📁 File System Optimizations:"
          if [ -f "$ARCH_DIR/ultra_filesystem.inc" ]; then
            echo "  - Multi-level cache: $(grep -c -i "cache.*l[123]" "$ARCH_DIR/ultra_filesystem.inc" || echo 0) references"
            echo "  - COW operations: $(grep -c -i "cow\|copy.*on.*write" "$ARCH_DIR/ultra_filesystem.inc" || echo 0) references"
            echo "  - Compression: $(grep -c -i "compress" "$ARCH_DIR/ultra_filesystem.inc" || echo 0) references"
            echo "  - Deduplication: $(grep -c -i "dedup" "$ARCH_DIR/ultra_filesystem.inc" || echo 0) references"
          fi
          
          echo "🔄 Scheduler Optimizations:"
          if [ -f "$ARCH_DIR/ultra_scheduler.inc" ]; then
            echo "  - I/O awareness: $(grep -c -i "io.*aware\|io.*priority" "$ARCH_DIR/ultra_scheduler.inc" || echo 0) references"
            echo "  - Load balancing: $(grep -c -i "load.*balanc" "$ARCH_DIR/ultra_scheduler.inc" || echo 0) references"
            echo "  - Real-time: $(grep -c -i "real.*time\|rt" "$ARCH_DIR/ultra_scheduler.inc" || echo 0) references"
            echo "  - Power awareness: $(grep -c -i "power.*aware" "$ARCH_DIR/ultra_scheduler.inc" || echo 0) references"
          fi

      - name: 📈 Performance Targets Validation
        run: |
          echo "📈 Validating performance targets..."
          
          # Check if performance targets are documented
          targets=(
            "100.*ns.*allocation"
            "100.*K.*IOPS"
            "3.*GB.*s"
            "95.*cache.*hit"
            "1.*microsecond"
          )
          
          for target in "${targets[@]}"; do
            if grep -r -i "$target" . --include="*.md" --include="*.inc" >/dev/null 2>&1; then
              echo "✅ Performance target found: $target"
            else
              echo "⚠️ Performance target not found: $target"
            fi
          done

  documentation-check:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📚 Check Documentation Completeness
        run: |
          echo "📚 Checking documentation completeness..."
          
          # Check for required documentation files
          docs=(
            "README-maxregnerOS.md"
            "kernel/trunk/maxregneros-arch/README.md"
            "programs/mros-dde/README.md"
          )
          
          for doc in "${docs[@]}"; do
            if [ -f "$doc" ]; then
              echo "✅ $doc found"
              
              # Check documentation quality
              word_count=$(wc -w < "$doc")
              if [ "$word_count" -gt 100 ]; then
                echo "  ✅ Adequate documentation length ($word_count words)"
              else
                echo "  ⚠️ Short documentation ($word_count words)"
              fi
            else
              echo "❌ $doc missing"
            fi
          done
          
          # Check for code comments
          echo "📝 Checking code documentation..."
          comment_files=$(find . -name "*.asm" -o -name "*.inc" | xargs grep -l "^[[:space:]]*;" | wc -l)
          total_files=$(find . -name "*.asm" -o -name "*.inc" | wc -l)
          
          if [ "$total_files" -gt 0 ]; then
            comment_ratio=$((comment_files * 100 / total_files))
            echo "📊 Files with comments: $comment_files/$total_files ($comment_ratio%)"
            
            if [ "$comment_ratio" -gt 70 ]; then
              echo "✅ Good code documentation coverage"
            else
              echo "⚠️ Low code documentation coverage"
            fi
          fi

  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔒 Security Scan
        run: |
          echo "🔒 Running security checks..."
          
          # Check for potential security issues in assembly code
          echo "🔍 Checking for buffer overflow patterns..."
          if grep -r -n "mov.*esp\|add.*esp" . --include="*.asm" --include="*.inc" | head -5; then
            echo "⚠️ Stack manipulation found - review for safety"
          fi
          
          # Check for hardcoded values that might be security-sensitive
          echo "🔍 Checking for hardcoded sensitive values..."
          if grep -r -i "password\|secret\|key.*=" . --include="*.asm" --include="*.inc" | head -5; then
            echo "⚠️ Potential hardcoded sensitive values found"
          else
            echo "✅ No obvious hardcoded sensitive values"
          fi
          
          # Check for proper input validation patterns
          echo "🔍 Checking for input validation..."
          if grep -r -n "test.*eax\|cmp.*eax\|jz\|jnz" . --include="*.asm" --include="*.inc" | head -5; then
            echo "✅ Input validation patterns found"
          fi

  integration-test:
    name: 🔗 Integration Test
    runs-on: ubuntu-latest
    needs: [code-quality, build-test]
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔗 Test Component Integration
        run: |
          echo "🔗 Testing component integration..."
          
          # Check if components reference each other correctly
          echo "🧠 Checking Ultra-Fast Architecture integration..."
          if grep -r "ultra_arch.inc\|ultra_memory.inc\|ultra_io.inc" . --include="*.asm" --include="*.inc" | head -5; then
            echo "✅ Architecture components are referenced"
          fi
          
          echo "🎨 Checking MROS DDE integration..."
          if grep -r -i "mros\|desktop\|panel" . --include="*.asm" --include="*.inc" | head -5; then
            echo "✅ MROS DDE components are referenced"
          fi
          
          echo "🌈 Checking skin integration..."
          if grep -r -i "vibrant\|skin" . --include="*.asm" --include="*.inc" | head -5; then
            echo "✅ Skin components are referenced"
          fi

  test-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [code-quality, build-test, performance-analysis, documentation-check, security-check, integration-test]
    if: always()
    steps:
      - name: 📋 Generate Test Report
        run: |
          echo "📋 maxregnerOS Ultra-Fast Test Summary"
          echo "======================================"
          echo ""
          echo "🔍 Code Quality: ${{ needs.code-quality.result }}"
          echo "🔨 Build Test: ${{ needs.build-test.result }}"
          echo "📊 Performance Analysis: ${{ needs.performance-analysis.result }}"
          echo "📚 Documentation Check: ${{ needs.documentation-check.result }}"
          echo "🔒 Security Check: ${{ needs.security-check.result }}"
          echo "🔗 Integration Test: ${{ needs.integration-test.result }}"
          echo ""
          
          # Overall status
          if [[ "${{ needs.code-quality.result }}" == "success" && 
                "${{ needs.build-test.result }}" == "success" && 
                "${{ needs.performance-analysis.result }}" == "success" && 
                "${{ needs.documentation-check.result }}" == "success" && 
                "${{ needs.security-check.result }}" == "success" && 
                "${{ needs.integration-test.result }}" == "success" ]]; then
            echo "✅ All tests passed! maxregnerOS Ultra-Fast is ready for deployment."
          else
            echo "⚠️ Some tests failed. Please review the results above."
          fi
          
          echo ""
          echo "🎯 maxregnerOS Ultra-Fast Architecture"
          echo "   Modern • Vibrant • Powerful"
          echo "   Built for ultra-fast computing!"

